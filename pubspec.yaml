name: harcama_takip
description: "Basit bir harcama takip uygulaması."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  fl_chart: ^0.70.0
  intl: ^0.20.2
  flutter_gen: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  generate: true
  uses-material-design: true
    
  assets:
    - assets/icon/   # İkonları koyacağın klasör

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"