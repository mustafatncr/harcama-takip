name: harcama_takip
description: "A simple expense tracking app to manage your personal finances."
publish_to: 'none'

version: 1.1.0+9

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
  shared_preferences: ^2.2.2
  fl_chart: ^0.70.0
  intl: ^0.20.2
  flutter_native_splash: ^2.4.7
  share_plus: ^7.0.0
  syncfusion_flutter_xlsio: ^31.2.15
  path_provider: ^2.1.3
  syncfusion_flutter_pdf: ^31.2.15

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_gen: ^5.12.0

flutter:
  generate: true
  uses-material-design: true
    
  assets:
    - assets/icon/
    - assets/fonts/Roboto-Regular.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#0C8F6B"
  image: assets/icon/app_icon.png
  android_gravity: center
  android_12:
    image: assets/icon/app_icon.png
    icon_background_color: "#0C8F6B"